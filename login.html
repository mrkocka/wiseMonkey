<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <title>Wise Monky | Login</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
</head>

<body class="page-login">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-box">
                <!-- Saját logóhoz cseréld le az src értékét -->
                <!-- <img src="logo.png" alt="Logó"> -->
                <div class="logo-fallback">
                    <img src="/img/Logo.png" alt="majom logo">
                </div>
            </div>

            <form>
                <div class="field">
                    <label for="username">Felhasználónév</label>
                    <input type="text" id="username" name="username" placeholder="Pl. peter.admin" required>
                </div>

                <div class="field">
                    <label for="password">Jelszó</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="options">
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        <span>Emlékezzen rám</span>
                    </label>

                    <a class="forgot" href="#">Elfelejtett jelszó?</a>
                </div>

                <button type="submit" class="login-btn">Belépés</button>
            </form>

        </div>
    </div>
</body>

</html>
